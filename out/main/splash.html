<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: drag;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease-out;
    }
    img {
      width: 420px;
      height: 420px;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    .app-name {
      margin-top: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffd100;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .loading {
      margin-top: 16px;
      width: 200px;
      height: 3px;
      background: rgba(255,209,0,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffd100, #ffaa00);
      border-radius: 2px;
      animation: load 2.8s ease-in-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes load {
      0%   { width: 0%; }
      50%  { width: 60%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <img id="splash-img" alt="WoW Warden" />
    <div class="app-name">WoW Warden</div>
    <div class="loading"><div class="loading-bar"></div></div>
  </div>
  <script>
    // Load the splash image from the path passed via query string
    const params = new URLSearchParams(window.location.search);
    const imgPath = params.get('img');
    if (imgPath) {
      document.getElementById('splash-img').src = imgPath;
    }
  </script>
</body>
</html>
